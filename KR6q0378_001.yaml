什麼人裁師云龍牙化云何似趙州栢樹師云尊宿眼在什麼處化云閙市裏虎化到真堂前云這箇是甚人真師云龍牙化云既是龍牙為什麼却在北禪堂裏師云一彩兩賽化云真在這裏龍牙在什麼處師擬議化便打一掌云莫道不解咬人師云乞兒見小利化又打師乃走北禪歲夜小參云年窮歲盡無可與諸人分歲今夜烹箇露地白牛煑野菜羮燒榾柮火喫了大家圍爐唱村田樂何也免使倚他門戶傍他墻致使傍人喚作郎至夜深維那問訊云縣中有人勾和尚禪云作什麼那云和尚夜來殺牛不曾納皮角禪遂捋下帽子云這箇不是那拾得便出禪喚侍者云賊賊那云天寒且還和尚帽子禪𮨇視師云這箇公案作麼生師云潭州紙貴一狀領過師訪芭蕉泉庵主問云庵主在麼泉云誰師云行脚僧泉云來作什麼師云禮拜庵主泉云恰遇庵主不在師云你𠰚泉云向道不在說什麼你我拽棒直赶下山明朝再去依前被赶師後又去問庵主在麼泉云誰師云行脚僧揭簾便入泉攔曾把住云這裏蟲虎縱橫尿床鬼子三回兩度來討箇什麼師云久嚮道風泉乃解開衣抖擻云你將謂泉大道有多少奇特師便問如何是庵中主泉云入門須辨取師云莫只者便是泉云賺殺幾多人師云前言何在泉云聽事不真喚鐘作瓮師云與麼則萬法泯時全體現君臣合處正中邪去也泉云驢漢不會便休亂統作什麼師云未審客來將何祗待泉云雲門胡餅趙州茶師云與麼則謝師供養泉云我火種也未有早道謝供養法昌語錄終偈頌洞山麻三斤火麻皮子若何分臈雪煎茶解醉君更有路行人未到野花含笑舊枝春風幡話不是風兮不是幡黑花猫子面門班夜行人只貪明月不覺和衣渡水寒雲居安樂樹安樂獨閑行三更打五更如何通一線流水和啼鸚凝雲亭凝雲封萬疊崔嵬路坦平如何通一線中夜日頭明漱玉亭漱玉本無瑕尋求轉更賒如何通一線雲月自周遮碧溪橋碧溪煙浪息萬像顯其中亦謂同相委寒松起暮風龍潭寒潭無底岸深隱有泥龍汝向長空露遊人何處逢都頌五四三二一波斯黑似漆走過新羅源老婆暗啾唧法身頌螺師吞大象石虎咬番馬驚起斷家龍踏落雲屋瓦廬陵米價烏龜三眼赤祥麟一角尖騰雲生暮雨溪月夜明簾送廉書記遊嶽祝融峯頂浪滔滔黑地須彌遶幾遭無角鐵牛安虎距丫叉玉女渡天河阿呵呵竹錫敲空雲陣高贈杉山庵主林泉放曠養清閑一片平川白日間深稱捿心誰得侶煙蘿縮手有寒山漁人罷釣日照青山積雪銷漁人歸去自歌謠從他逐浪隨波者時把長竿望海潮因看圓覺經菩提妙有無心證本覺含靈喻火蓮真金不假經爐冶空裏無花紅焰天雲起斷崖泉滴瀝風吹寒葉落飄然時人若問真圓覺睡思來時合眼眠因看經半滿藏兮一落索子細看來特地錯東村黃老打張三兩箇善神齊發惡休發惡寒猿昨夜繞窻啼白鳥今朝上虗閣送僧倒拈笻杖扣長空雲起龍奔鳥道同端手掣開千聖眼江淮兩浙好西東山居五首松遠柴門靜高眠日午開此景誰頻到雨過白雲來鳥熟分亭語猿純對坐禪松聲寒索索嵓溜冷涓涓閑步穿松影逢人背負薪問渠何處去濟水白如銀境有松擎鶴家無飢鼠粮客來何見待山塢藥苗長山壑路崔嵬知音絕往來如何彰一信石笋和雲裁看山風疾浮雲急春山雨過青遊人休更問㵎水響冷冷無繩自縛雲鶴高空外林泉性本閑何須更特地好肉自生剜紙帳頌揭起露全身放下絕纖塵誰人知此意拾得自忻忻因事金剛開佛口菩薩𨳲天堂提取靴衫去無人住處藏詠寒山𪑚𪑚𪒴𪒴癡癡獃獃若人識得不在天台寄新僧判龍岫深藏久桃花幾度開看山見不見不見下山來三玄頌體中玄獨角泥牛水上眠轉身觸破澄潭月巫山頂上浪滔天用中玄征人帶甲眠春花風掃盡黃葉落堦前句中玄遠道絕人煙甜瓜甜似蜜苦瓠苦如蓮第一句無邊大火聚擬議早身灰誰敢當頭第二句龍播并虎踞更問毗耶離已落他路布第三句脫却孃生袴直下便承當鐵山橫在路第一訣袖裏三斤鐵忽遇病維摩拈起驀頭㨝第二訣六月漫天雪無處避炎蒸渾身冷如鐵第三訣八字無兩胡僧笑點頭眼中重著屑法昌石鏡不分凡聖盡入圓光更無少剩法昌木虵伏爪藏牙忽然磕著且看脚下法昌鐵杖生風起浪遊戲神通諸方牓樣歌會方首座默歐山重會西蜀客長喜共坐長松邊高阿月下安禪石或忘機秉微迹或放浪兮傲危碧蒼蒼雄勢何嵳峩島疊煙花笑寒栢蒭狗吠露地白堂堂走入黃金宅纖𦝫玉女少年騎野老逢兮背上拍是什麼荊山璧傾盡𦘕瓶三兩隻從他徒蟻竟頭奔拶破面門橫片石或時順或時逆波斯不繫欄腰帛踏飜東障與西籬劃斷虗空通漢陌明處明黑地擇笑倒前村張二伯憶得先年泛鐵舡旱地沉兮何處覔或喧喧或寂寂今古悠悠忘曉夕吾師吾師桃花落盡舊芳枝望路行人休借借噫骼因事頌瓊林高翠影澄潭東斗西觀一二三臥水鐵牛奔北嶺雙敷丹枕鴈歸南竹肥因地壤松低雲勢高殘陽照空影飢鼠念彌陀片水涵虗月池方水不圓崑崙不瞪眼金剛休努拳送信化主徹大丈夫方猛列如虫帶角入來起倒不須藏利舌或逢時快便打打破盧公慳恡穴金烏明兮在口中玉兔出兮圓復缺或登山握九節或臨水兮莫漏泄青山崷崒白雲深頂上新羅人寄人金烏照破鐵崑崙玉兔明庭古樹分蒭狗吠天星斗轉泥牛哮吼聵人聞水聲林鳥聲相和大海澄清徹底昏奚事揮毫聊寄委野花新發舊年春登山九仞嵳峩插太清萬般唯有一真明遊人須到孤峯頂莫住中腰見不平歌風不鳴條雨不破塊罪性虗兮勤當懺悔須彌崙悟為最文殊普賢成一對雲開高嶺古松青把手問君誰不會誰不會不破塊不破塊兮百雜碎送平知客握手窺天睡雲林幾處山何時提一髮攪動碧潭寒誡安徒堪歎紅爐一點雪萬物皆如世不堅莫愛好花多艶曳應無百日對君鮮送僧風便鐵帆掛海舟客歸南浦萬緣休丫角共眠雲寺古同步㵎邊幽展臂掣開空裏盖轉身踢破月中漚來年香茘多應熟莫守吳州更上樓自詠白玉休將並白石黃金休用博黃鍮丈夫若是丈夫兒好醜高低在眼頭從他傾岳千江浪任是長竿四海鈎睡來獨笑緣何事茶煑松篁泛一甌寄僧德備河沙體自成為迷踏雪五千程雖然外有玄兼妙及至春來草自青寄昭師兄溪月同觀影異圓嶺雲重鎻故山關烏鷄帶月啼天曉蒭狗㘅花吠斗寒徑直斫開籬却易迃回鑒入應難龍川露滴層峯外紅日圓暉北上看雪亂峯銀色普賢機古道雖通步者稀莫話烏鷄添指注嶺梅先發向南枝不勘自破打破長空不用鎚門頭何假更安錐從他勝有張良計不勘還須失利歸日用事撥散日中影摘取月中鮮手眼不到處知音須進前寄徐龍圖孺子從來心性惡不是德山誰敢撲法昌一句沒人知信手抝折珊瑚枝也大奇五十年來尋不得鑒咦翻身踢破𦘕須彌拽下虗空為井盖作地衣一等師子兒他時若見毗耶老腦後錐頭角分明辯大溈答徐龍圖法昌有條老鱉鼻生得來來沒向背藏身露影恰如無觸著令人身粉碎那箇驢更奇異兩耳累垂四脚著地正與麼來為虵出氣虵不惜命近前噴嚏和那老驢總不靈利又答徐龍圖千里同風君道好正是將身入荒草直饒顯在眾人前想應未見黃龍老貼肉汗衫新復新三山帽子何曾倒無銙𦝫帶兩頭垂沒底麻鞋踏未破來來與你瓢苗石上栽來年収得大冬瓜快斧利刀斫不破寒山拍手笑呵呵指出南岳讓和尚寄黃龍南禪師春色青青鸎轉歌桃紅李白見人多不知誰愛靈雲道指下山來謁我呵送僧黃菊香時綠草衰杖藜林際話南歸也知舊岳無金石獨掩柴門對落暉師臨遷化前一日送頌與徐龍圖今年七十七出行須擇日昨夜問龜哥報道明朝言師住持二十三年徐龍圖作師真贊誰不會禪要作國師二十三年無人謾疑草長雪消春爛漫分付諸方老古錐山谷老人頌法法遍參如鏡中現水上胡蘆按著便轉達法性地稱性修行而常以法為娛樂者予見老法昌其人也今余照刻行其語乞題䟦故為之書靈源叟惟清云
