body:
  text: 小師宗密錄師開堂日宣疏罷遂陞座乃拈香云此一瓣香奉為今上皇帝祝延聖壽伏願龍圖永固鳳曆長新四海晏清法輪常轉又拈香云此一瓣香奉為知府學士闔郡宷僚伏願壽山增峻福海罙深永為天子股肱長作宗門外護又拈香云此一瓣香三世諸佛名字不知諸代祖師面目不識不是龍宮海藏亦非虎穴魔宮還有人知得來處麼奉為潭州北禪賢禪師爇向爐中或聞或見盡獲真常乃斂衣而坐維那白槌云法筵龍象眾當觀第一義師云好箇消息還有識得者麼如無有疑請問僧問諸佛出世地涌金蓮和尚出世有何祥瑞師云須彌頂上擊金鍾進云與麼則今日得聞於未聞師云聞底事作麼生進云非唯觀世音我亦從中證師云有眼如盲猶似可有耳如聾笑殺人進云只如釋迦已滅彌勒未生正當與麼時佛法如何舉論師云盡在法昌拄杖頭進云學人為什麼不曉師云杲日當天盲人摸地進云與麼則大眾沾恩去也師云你見箇什麼道理進云欲言言不及林下好商量師云亂統禪和如麻似粟僧問世尊出世先度五俱輪和尚出世先度何人師云隨泥作佛進云學人正在迷途和尚為什麼不垂方便師拈起拄杖云見麼進云見師云莫道無方便進云莫便是和尚為人處也無師放下拄杖僧禮拜師云邯鄲學唐步僧問祖意西來即不問陞堂演法事如何師云家常茶飯進云與麼則勞而無功去也師云知恩者少負恩者多進云靈然一句超群像逈出三乘不假修師云你且莫草草僧問如何是法昌境師云地靈步步雪山草進云與麼則僧寶人人滄海珠師云總似這僧省多少力進云向上還有事也無師云向下亦無進云和尚是什麼心行師云好心不得好報僧問止止不須說我法妙難思鳴鼓陞堂當為何事師云一願皇帝萬歲二願重臣千秋進云猶是世諦流布宗門事又作麼生師云口似磉盤進云為什麼如此師云不敢犯闍梨嚴令進云慈悲何在師云不見道止止不須說進云署色未分人盡望及乎天曉也尋常師云自作自受師乃云問話且止吉㐫未兆早是多端那更問答縱橫轉疎轉遠何故妙性圓明離諸名相本來無有世界眾生因妄有生因生有滅生滅名妄滅妄名真三世諸佛到這裏瞻仰無暇一大藏教詮題不及是以毗耶老漢杜口無詞摩竭尊雄望風結舌直饒宗乘大啟祖令當行截斷逈超諸有棒頭取證喝下承當唱道門中子檢點將來大似隔靴㧓痒豈不見昔師開堂三聖推出一僧寶壽便打三為人不獨瞎這僧眼瞎却鎮州一城寶壽擲拄杖歸方丈諸仁者古人一期接物利生便有如此奇特之事千古之下玉振金聲然則事無一向理出多途只如法昌今日為國開堂豈無利益敢問諸人適來許多問答且道與寶壽禪師是同是別若道是同金沙未辯玉石未分參學眼在什麼處若道是別至道無難唯嫌揀擇佛法豈有二耶還有向這裏明得麼良久云萬古碧潭空界月再三撈摝始應知謝詞不錄上堂云釋迦未滅迦葉未聞從凡入聖功不浪施大藏教文如金如玉洎乎金色頭陀受法傳衣龍宮海藏無處出頭且道祖師有什麼長處一丸消眾病不假藥方多上堂云你若退身千尺我便當處生芽你若覿面相呈我便藏身弄影你若春池拾礫我便撒下明珠直得水洒不著風吹不入如箇無孔鐵鎚相似且道法昌還有為人處麼利刀割肉瘡猶合惡語傷人恨不消上堂云春山青春水淥一覺南柯春睡足携笻縱步出松門是處挑英香馥郁因思昔日靈雲老三十年來無處討如今競愛摘楊花紅香滿地無人掃上堂云春不晴夏不雨禾不禾兮黍不黍謾言孫子解耕鋤不得天時亦辛苦莫辛苦看看便是秋霖霔法昌不是解天文暗中自有龍神護上堂僧問古鏡未磨時如何師云却須磨取進云未審如何下手師云鏡在什麼處僧作圓相師便打云這漆桶塼也不識師乃云祖師西來特唱此事只要時人知有如貧子衣珠不從人得三世諸佛只是弄珠底人十地菩薩是求珠底人汝等正是伶俜乞丐懷寶迷底人在靈利漢纔聞人舉著眨上眉毛便知落處若更踏步向前不如䇿杖歸山去長嘯一聲煙霧深上堂僧問知有底人畢竟向什麼處去師云自家掃取門前雪莫管他人屋上霜進云也要大家知師云不勞懸石鏡天曉自鷄鳴進云和尚何得干戈相待師云飢逢王膳不能飡進云且莫壓良為賤師云你且道知有底人向什麼處去僧無語師云莫道壓良為賤師乃云不用馳求見成活計金不愽金水不洗水曲不藏直真不掩偽象鼻猪頭魚腮鳥觜更問如何歸堂打睡上堂云欲識佛性義當觀時節因緣巢居知風穴居知雨鷰去鴈來寒暑更互是人知有且道世尊拈花迦葉微笑是什麼時節還會麼冷如氷白如雪是處成堆光皎潔茫茫欲火欲燒人惆悵無因為君說上堂云法昌五日陞堂不為談玄說妙虗空自有龍神誰問僧多僧少上堂云聞說法昌山尋常多猛虎食盡犬與羊更無狐與兔白日傷行人乃至三四五既作住山人須作山中主伽藍土地五通神自今已後須巡護畫時駈出向他山教伊食泥兼食土香燈粥飯不曾虧此物寧容當大路更當路送汝前山頂上乘風雨上堂云單絲不成線獨掌不浪鳴達磨為甚隻履西歸直饒你道得出身句我且問你古人意作麼生良久云騎驢戴蓆帽渡水不穿靴春日上堂云危樓𦘕角報春回暖日潛吹面開蟄戶幾多頭角者可應無意待風雷黃龍南禪師至師上堂僧問二龍爭珠時如何師云法昌小出大遇進云忽然傾湫倒嶽又作麼生師便打進云有問有答為什麼不分賓主師云適來一棒是賓是主進云學人與師共用師云這漆桶又打進云不因漁父引爭得見波濤師云且莫鈍致黃龍僧禮拜師云教休不肯休僧問三玄三要即不問韶石家風事若何師云塵中人未識雲外客先知進云為復是天中函蓋為復是逐浪隨波師云一任敲塼打瓦進云和尚為什麼把定封疆師云不解撑舡翻嫌溪曲進云未審雲門木馬甚處嘶鳴師云在闍梨鼻孔裏進云有鼻孔且從無鼻孔又向什麼處師云好箇衲僧元無鼻孔僧便喝師云爐韛之所鈍鐵尤多師乃云拏雲攫浪數如麻點著銅睛眼便花除却黃龍頭角外自餘渾是赤班虵法昌小剎路遠山遙景物蕭踈遊人罕到敢謂黃龍禪師曲賜光臨不唯泉石增輝亦乃龍天喜悅然雲行雨施自古自今其奈爐韛之所鈍鐵尤多良醫之門病者愈甚瘥病須求靈藥銷頑必藉金鎚法昌這裏有幾箇墮根阿師病者病在膏肓頑者頑入骨髓若非黃龍老漢到來總是虗生浪死遂拈起拄杖云還會麼打還他州土麥唱歌須是帝鄉人頭戴華巾離少室手携蓆帽出長安鷲峯峯下重相見鼻孔元來總一般黃龍胡蘆棚上掛冬瓜麥浪堆中釣得鰕誰在𦘕樓沽酒處相邀來喫趙州茶法昌鐵牛對對黃金角木馬雙雙白玉蹄為愛雪山香草細夜深乘月過前溪黃龍玉麟帶月離霄漢金鳳銜花下綵樓野老不嫌公子醉相將携手御街遊法昌上堂云乾坤之內宇宙之間中有一寶祕在形山師云且緩緩法昌有一寶七㒹與八倒或作無明山或時為相好觸處盡光輝動便入荒草休尋討珊瑚枝上日杲杲上堂云夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止欲識佛去處只這語聲是古佛垂慈不無方便爭奈雖是善因而招惡果傅大士如張幔天底網撈龍打鳳奈何鱗甲羽毛盡在裏許逃生無路若是靈禽瑞獸決定別有生涯四月八日上堂云我佛世尊降誕迦維直得九龍吐水天雨四花一手指天一手指地便道天上天下唯我獨尊大似傍若無人及乎韶陽老漢出來打一棒諸方將謂瓦解氷銷殊不知天欲明而必暗人欲旺而必衰譬如塗毒鼓打著即乖致令祖域千古之下競起干戈掛人唇齒法昌臨危不悚人好一捧太遲生未離兜率脚跟下便好與一錐豈到今日然雖如是大似賊過張弓莫有向這裏下得一轉不傷物義底語不唯與瞿曇出氣亦乃劃斷諸方葛藤有麼莫怪渠儂多意氣他家曾踏上頭關上堂云三界唯心四句絕萬緣唯識百非除一法有餘著不得無餘一法亦還祛古人恁麼說話大似送人上樹了去却梯好事不如無何故佛說一切法為度一切心我無一切心何用一切法法昌今日不惜性命為你諸人安梯了也下得者四事供養敢辭勞下不得者萬兩黃金亦消得明眼漢辯取良久云早知燈是火飯熟也多時上堂云雲収大野月皎長空樵唱冲巖漁歌蓼岸森羅萬象帝網交光四聖六凡重重海印普賢樓閣十字縱橫少室峯前交點不過何也譬如琴瑟箜篌雖有妙音若無妙指終不能發到這裏莫有吹無孔笛調沒弦琴底衲僧試為法昌下妙指發妙音撫一曲看有麼良久云貧無達士將金施病有閑人說藥方寬禪師至師遂作此圓相與寬便自出作務明日上堂法座前問寬昨日公案作麼生寬於地上作此圓相了以脚擦却師乃云寬禪頭名不虗得遂陞座云忽地晴天霹𮦷聲禹門三汲浪磅渹幾多頭角為龍去鰕蟹依前努眼睛上堂云敲針作釣豈是良圖截海橫網方為作者忽遇錦鱗頳尾直教振𩮻搖空若是跛鱉盲龜且從他三三兩兩為什麼如此曾為宕子偏怜客自愛貪盃惜醉人上堂云聞聲悟道何異緣木求魚見色明心大似迷頭認影諸仁者不用續鳧截鶴夷嶽盈壑南辰北斗躔度分明日晦月明昇沉自異但請休征罷戰端拱無為自然得箇入頭差肩佛祖若更言中辯意句裏明機清風月下守株人凉兔漸遙春草綠上堂云一不放二不収牧人橫笛倒騎牛松軒月冷夢初破一聲吹起塞門秋上堂云秋風颯颯秋雨微微賓鴻未至海鷰將歸蟬蕭蕭兮林疎葉落月皎皎兮虎嘯猿啼或聞或見孰悟孰迷會與不會莫亂針錐君不見新豐老太孤危寸草不生千萬里出門何事正萋萋上堂云菩薩貪功聲聞滯寂三界群生不知恩力便請回光歇却心識一念相應玄關可擊上堂云諸方浩浩商量法昌冷冷落落從教古殿生苔免見填溝塞壑逞神機誇妙略筭來總是閑斟酌爭如裂破太虗空薦取如來那一著噫錯上堂云無明實性即佛性幻化空身即法身拈起拄杖云釋迦老子變作一條拄杖在法昌手裏拈起則劃斷三乘放下則平欺佛祖忽然撞著懵懂禪和法昌急急退步良久云看歲旦上堂僧問孟春猶寒即不問新年頭還有佛法也無師云東山西嶺青進云這箇猶是世法如何是佛法師云罕逢穿耳客多是刻舟人進云爭奈學人未曉師云覿面相呈猶未曉不如靜處薩婆訶僧禮拜師云靈利衲僧僧問新年已去未審如何是不遷底句師云去年曾折處今日又抽條進云這箇猶是遷謝底在師云物逐人興進云未審祖師鼻孔是新是舊師云你在甚處見祖師進云和尚恐某甲不實師云你且道是新是舊僧無語師云洎不問過師乃云四序循環周而復始百歲光陰猶如撚指鳴鼓陞堂諸方事例舉論宗乘是非蜂起緣聚則生緣離則死未出輪回如何逃避休休時行則行時止則止君不見達磨當年到魏時被人打落當門齒上堂云虗明自照不勞心力若到這裏會得便請掊珠擲玉罷戰休征不唯道泰時康亦乃國安靜何也上是天下是地日頭運轉虗空裏假使碧潭清似鏡終教明月下來難若是玄機尚戢冥運猶潛任是六臂三頭也須牽羊納璧上堂云莫莫大丈夫何太錯泥牛只解駕宗乘木馬何曾生犢角魚不捿鳥不箔遼天須是遼天鶴只知犯重障菩提不薦如來大圓覺休休休摸𢱢醍醐上味世所珍遇斯等人成毒藥上堂僧問一花開五葉結果自然成葉則不問如何是花師云茂蕚連天秀馨香匝地紅進云什麼田地栽得師云長自靈山雨開因少室風進云未審幾時結菓師云但得根株是何愁菓不収進云學人還有分也無師云無分進云人人具足學人為什麼無分師云莫將凡界眼來覺園春師乃云昨日看庭花今朝翫芳草芳草與庭花各自爭妍好花先芳草衰草亦隨花槁如何浮世人不悟生難保良久云何須待零落然後始知空上堂云龍吟霧起虎嘯風生法爾如然非由造作參玄上士善別機宜莫倚他門喫他殘飯況是當人己事直下分明應用無方不從人得本無位次莫強安排赫爾靈光超諸數量隨緣放曠任性浮沉如杲日當空似蓮花出水聖凡罔測物類何更若言中取則句下丹青大似𦘕餅充飢終無所益上堂云聞聲悟道見色明心乃拈起拄杖云豈不是見又敲床一下云豈不是聞那箇是明悟底事若道聞聲是我見色非他黃口小兒點頭嚥唾多子塔前一場懡㦬為什麼如此誰知遠煙浪別有好思量上堂云八月十五中秋節露洗層巖光皎潔珠簾是處捲清輝不知只是舊時月諸仁者當人己事妙絕言語識不可識智不可知一代時教只是箇切脚所以道脩多羅教如標月指參學兄弟到這裏合作麼生一大藏教既是標指且道月在什麼處不見僧問投子靈山如指月曹溪如𦘕月如何是真月投子云昨夜三更轉向西投子古佛善識時機如鍾在架隨扣發聲似鏡當臺物來斯照然則一期方便這僧大似避得風雷重遭霹𮦷爭如法昌直下與伊道却遂作圓相了云此夜一輪滿清光何處無上堂云古者道百尺竿頭坐底人雖然得入未為真百尺竿頭須進步十方世界現全身只如百尺竿頭如何進步要會麼南贍部洲北單越要行則行要歇則歇忽若遇見玄沙打你頭破腦裂且道有什麼過棒頭有眼明如日要識真金火裏看上堂僧問四山相逼時如何師云寶車在門外進云和尚豈無方便師云貪生逐樂區區去喚不回頭爭奈何進云忽然喚得回時如何師云但辦肯心必不相賺進云作家宗師師云也是死中得活僧擬議師便打師乃云平地上死人無數過得荊棘林者是好手不重己靈不求諸聖十二時中不倚一物正是平地上事在你若起心動念即乖法體更乃大用現前於毛端上現寶王剎坐微塵裏轉大法輪喚作開眼尿床不消老僧一喝你且道荊棘林作麼生透良久云携取詩書歸舊隱野花啼鳥一般春上堂云三界無法何處求心四大本空佛依何住靈利漢纔聞舉著便好截斷兩頭歸家穩坐從他叢林浩浩保社駢駢豈不快哉不得容易忽若有箇漢出來拊一掌還聞麼竪起拂子還見麼大好無法擗脊打一棒鼻孔裏錐一錐待你知痛識痒大好無佛正當與麼時莫道法昌悞你還會麼白日莫空過青春不再來上堂拈起拄杖云我若拈起你便喚作先照後用我若放下你便喚作先用後照我若擲下你便喚作照用同時忽然不拈不放你向什麼處卜度直饒會得倜儻分明若遇臨濟德山快須腦門著地且道伊有什麼長處良久云曾經大海休誇水除却須彌不是山上堂云毫釐有差天地懸隔欲得現前莫存順逆諸仁者山河大地㸦顯主賓三界聖賢交光相映到這裏不取一法不捨一法亦無無取捨知解喚作海印三昧正是貼肉汗衫直得不捨道法現諸威儀石火裏沒去電光裏出頭刀梯劒樹虎穴魔宮七通八達一一分明我且問你百草頭上還曾夢見夾山麼上堂僧問祖意西來即不問樹彫葉落事如何師云少室宗風全體露闍梨何得不惺惺進云爭奈彫落何師云眼花山影轉進云畢竟如何會師云不是知音者徒勞話歲寒僧問諸法寂滅相不可以言宣少室宗風如何舉唱師云一家有事百家忙進云猶是學人疑處師云若是鳳凰兒不向籬邊走僧禮拜師云我也未信你在師乃云心隨萬境轉轉處實能幽隨流認得性無憙亦無憂諸仁者看看釋迦老子披毛帶角上刀山入火聚然後變作一頭水牯牛走入溈山隊裏去也你等諸人還見麼你若見許你具一隻眼你若不見也許你具一隻眼且道法昌為人眼在什麼處良久云名字莫將題落葉恐隨流水到人間上堂云即此見聞非見聞無餘聲色可呈君箇中若了全無事體用無妨分不分鵶鳴鵲噪法法圓成水淥山青頭頭顯煥見亦同見聞亦同聞因什麼有迷有悟良久云莫言佛法無多子不是苦心人不知上堂云若是知有底人入林不動草入水不動波便能脫珍御服掛弊垢衣與眾魔共一手作諸勞侶接待方來猶是傍借邊事何也澄源湛水尚棹孤舟古佛道場猶乘車子若是箇中人直須向虵頭上揩痒驪頷下抉珠驅耕夫牛奪飢人食若能如是始解坐報化佛頭踏盧遮那頂法昌與麼說話大似夢中說夢何謂也爭似不來還不往亦無懽笑亦無愁上堂僧問佛佛授手祖祖相傳未審傳箇什麼師云須彌頂上鐵崑崙進云當表何事師云去國知歸路伶俜獲寶珠進云實際理地不受一塵未審珠向什麼處安者師云從來光璨爛不用強安排進云與麼則謝師指示師云珠在什麼處僧擬議師云了師乃云見聞如幻翳三界若空花聞復翳根除塵消覺圓淨淨極光通達寂照含虗空却來觀世間猶如夢中事諸仁者祖師門戶已被釋迦老子八字打開了也更無絲髮許間隔直下會得可謂光前絕後若更別有商量却許汝具一隻眼上堂僧問摩尼珠人不識如來藏裏親収得如何是珠師云龍宮無覔處海藏豈能収進云未審畢竟在什麼處師作圓相僧展兩手師便打僧禮拜師云三更猶自可天曉更愁人師乃云有物先天地無形本寂寥能為萬象主不逐四時彫四時運轉萬象摐然見聞不昧視聽分明且道那箇是主莫是與麼來者是麼莫是妙體本來無處所麼莫是一念未生時全體是麼與麼卜度大似坐井觀天管中窺豹若是諦當底人總不用許多辛苦良久云陋巷不騎金色馬回來却著破襴衫至節日上堂僧問古者道陽氣發時無硬地無根樹子為什麼不開花師云話頭也不照顧進云爭奈人人具足師云你樹子在什麼處僧提起坐具師云謔你老郎便打僧問祖意西來即不問直截根源事若何師便喝僧亦喝師喝一喝拊一掌僧云作家宗師師云劄僧禮拜師云未出場來不妨奇特師乃云一陽來復萬物知春堤邊柳眼爭開㵎畔梅英競吐連嵓樹凍丹鳳那捿鎻月潭氷遊龍未作錦衣公子盡醉如泥林下道人幪頭打睡且莫睡閑向江頭看逝水世間好物不堅牢綵雲易散琉璃脆上堂云行路難君自看鳥道從來不易攀行人未上先傴僂頦膝時時自相拄捫蘿直到巔峯頭方知世界空悠悠上堂云花菲菲雨霏霏游人陌上正如泥誰在𦘕樓吹玉管一聲聲送日沈西上堂云至道無難唯嫌揀擇三界聖凡和泥合水燈籠露柱儱侗顢頇凡夫生死諸佛涅槃如何得不揀擇莫是毫釐有差天地懸隔麼莫是情盡圓明時會取麼莫是萬法唯識盡是我心不可更有彼此且喜沒交涉若是法昌是便是非便非江南日暖鷓鴣啼非不非是不是飜笑維摩談不二箇中若未造玄微且薦如來第一義結夏日晚小參云大凡參學兄弟道眼未明心地未安入一叢林出一保社須當親近良朋善友二六時中將佛法為事直須決擇令心眼精明這箇不是小事光陰易失時不待人一失人身卒未有出頭處在莫只與麼打閧過時今日三明日四這裏經冬那邊過夏記取一肚葛藤路布學解到處掠虗摩唇捋觜漢語胡言道我解禪解道輕忽好人作無間業將知此事大不容易沒量大人到這裏討頭鼻不著莫當等閑亂開大口法昌老漢無人情莫愛人摩捋你讚歎你盡不是好心一朝火風解散眼光落地善惡業緣受報好醜生死境界一時現前那時便如落湯螃蠏手忙脚亂從前活計神通佛法總使不著業識忙忙無可依怙追悔不及隨緣受報改頭換面都未可定豈不見古者道學般若菩薩且莫自瞞切須子細纖毫不盡未免輪迴絲念不忘盡從沉墜你要識披毛帶角底麼便是你尋常亂作主宰者是你要識拔舌地獄麼便是誑惑迷徒者是你要識寒氷鑊湯底麼便是你濫膺信施者是三塗八難盡是你心自作只為道眼不明方乃如是若是諦當底人豈有這箇消息法昌與麼說話盡是契合諸聖不獨為你三兄五弟但未得忍菩薩皆有此過豈況天龍八部既來這裏經冬過夏莫生容易老僧钁頭邊討飯供養你說些子出家話莫被人我夯却一生空過一旦四大分張那時作伎倆遲也有一般漢聞人舉著他肚裏事嗔心忿起便道佛法豈有與麼事大悟不拘小節更問阿誰我且問你悟見箇什麼還脫得髑髏識想也未十二時中且與五戒十善相應靈山會上還曾見有無行業底佛麼還有妄語底祖師麼大似將牛屎比栴檀有甚交涉可謂醍醐上味為世所珍遇斯等人飜成毒藥你要得他日相應但如今於一切處放教枯淡二六時中對五欲八風如盲人視物不為諸法管帶亦不管帶諸法六根門頭點檢無絲髮過患方有少許趣向分法昌與麼說話如服瞑眩底藥相似一斯苦口他時大有得力處所以古者道假使百千劫所作業不忘因緣會遇時果報還自受無人替代各自努力上堂云古者道大地雪漫漫春來依舊寒說禪說道易成佛作祖難法昌道大地雪漫漫春來便不寒到頭成佛易却是說禪難有一般人聞與麼說鼻孔冷笑道有甚難朝到西天暮歸唐土南山起雲北山下雨甘草甜黃蘗苦魚入深潭鳥棲高樹拈起拄杖達磨眼睛放下數珠釋迦鼻孔若是這箇禪三家村裏臭口老婆也解說得要成佛則未在你且道畢竟那箇是禪良久云直得額頭汗出上堂云草蘺蘺煙幕幕雨如膏雲似鶴輪蹄到處困芳菲誰問山頭紅日落禪家流須警覺莫待擎頭并戴角百年光景片時間舉世應無長命藥逐利貪名數似麻排頭盡葬青山脚菩提道路不曾脩畢竟將何為倚托上堂云菩薩證未極二乘方沉空人天三界業正在輪迴中諸仁者若論此事唯佛與佛乃能知之十地聖人猶隔羅縠自餘之輩合作麼生無常老病不與人期一失人身萬劫不復三界牢獄縈絆殺人不是等閑莫生容易大事未成如喪考妣二六時中放却閑緣歇却心識但自回心問己想料不由別人警䇿身根莫教污染直令凡聖情盡人法俱空自然體露真常諸有若不如是與道全乖上堂云佛大泥多舡高水長我愛釣魚翁生涯無比況分開曉霞影擲破桃花浪流水送歌聲風高愈嘹亮堪笑錦鱗鈎不上三三兩兩空悠漾莫悠漾直饒避得鈎前頭大有網魚即且從佛在什麼處莫是殿裏底麼莫是作圓相麼莫是在靈山麼莫是對面不相識麼莫是認著依前還不是麼若如此只是箇三家村裏佛不者且道那箇是調御涅槃今已久龍光猶未迦維上堂云宗乘一句逈絕言詮意下差排虗生浪死靈山會上覿面相呈授手傳來如王寶劒乘不墜蓋藉其人如師子遊行群狐屏迹龍象蹴踏非驢所堪或時警悟群機曲垂方便遂有言句落在諸方如龍藏選珠終無瓦礫直得天龍稽首佛日光輝近來時代澆漓禪師長老成群作隊一箇箇氣宇如王一人人平肩佛祖問著宗門兩字口似研槌但將凡言黷亂聖意致令學者習俗生常不唯侮慢聖賢亦乃自生容易或言即心是佛更不參尋或則妄認塵緣強作主宰無非私心作解捏目生花緣木求魚守株待兔蓋為打底不遇作家致見如斯過患勸諸學者莫謾波波但自回光返照疊足思心盡却凡情別無聖解縱有幽玄飜成計較古者云道不用脩但莫污染禪不用學貴在息心息心則想念不生無染則真源自淨更若他求必無是處百丈和尚至師上堂云道無今古人有先後出則大用繁興入則機唯密照記得百丈大智禪師在日常有一老人聽法自云過去生中曾為知識有人問大脩行底人還落因果也無某甲云不落因果從此五百生墮作野狐今告代一轉語願脫此苦百丈云不昧因果即脫狐身然則野狐脫去其奈吐下涎唾落在諸方無人打摒敢問諸人不落因果為什麼墮作野狐不昧因果為什麼便得脫去直饒道得落處分明也未出他野狐穴裏法昌當時若見但先與他拈出雪峯古鏡教伊轉動不得然後放出紫湖狗子盡却性命免見兒孫今日成群作隊法昌與麼舉論大似持螺酌海明眼人前一場笑具何故曾經大海難為水慣聽無絃不易琴上堂云且莫停囚長智養病喪軀長者任他長短者任他短風動空澄日明雲翳泥多佛大水長舡高法法圓成莫妄穿鑿直得風行草偃水到渠成不為分外忽爾小中現大大中現小於一毛端徧能含受十方剎土坐微塵裏轉大法輪若到法昌面前一筆勾下何也丈夫自有衝天氣莫向如來行處行上堂云至人空洞無象萬物無非我造會萬物為己者其唯聖人乎老僧昨夜作一箇夢夢見入大洋海底撞著須彌山頭額粉碎你等諸人還知痛痒麼上堂云言前薦得滯殻迷封句下精通觸途狂見然雖如是其奈金沙猶混水乳不分法昌道言前薦得天雨四花句下精通地搖六種且莫草草九十六種外道各各自言得上人法菩薩果位猶不相知譬如諸天同寶器食福德有異飯色不同若無擇法眼目如何明辯忽遇迷之子止宿草庵疲乏商人化城寓止寶所尚歸路亦遙不覺不知中途自息似這般垛根漢不可也受法昌讚嘆所以我佛傳衣付法須令授手相證據恐有濫誤蓋謂此也然雖如是忽若有箇漢出來喝一喝拊一掌掀倒繩床便歸眾去諸人作麼生明辯良久云敵聖若無如是眼假饒千載又何為上堂云生死事大無常迅速行脚高士更於何處用心饒你學得聖解現前獲三明六通得四無礙辯一大藏教結角羅紋貯水不漏明眼人著大似檐雪填井豈不見世尊於楞嚴會上呵叱阿難汝雖歷劫憶持如來祕密妙嚴不如一日修無漏業免被人天果報所縛十二分教到這裏一點也用不著方為教外別傳如今兄弟都不問此事來處但管違背佛語返於經教中作伎倆辨唯心唯識說性說相如將方木逗圓孔有甚交涉將知宗門途路逈別且人天因果通貫聖凡如何免得無漏聖境理絕功勳若為修證還會麼自是不歸歸便得五湖煙景有誰爭上堂云靈山會上三乘行位解脫法身正是乞兒殘飯祖師西來直指人心見性成佛正是祭鬼神殘飯汝等若見如經蠱毒之鄉更莫著著則禍生法昌這裏有一般茶飯尋常不曾拈出今日事不獲已將供養諸人他時若到諸方受用殷繁切須記取法昌今日供養遂作一圓相擲下拄杖上堂云毗耶杜口倣斆宗乘鷲嶺拈花飜成毒藥九年面壁鈍致先宗半夜傳衣欺他後學馬祖即心是佛大似待兔守株盤山非心非佛可謂和泥合水縱饒德山棒如雨點正是以己妨人臨際喝似雷聲要且不曾撩著豈況聚頭接耳舉古圓今列洞下五位君臣尚它薄禮布臨濟三玄戈甲敗落清時雲門函蓋乾坤無繩自縛法眼唯心唯識豈達機權溈仰父子相投傍觀者醜如斯之見盡是敗祖宗風滅胡種族承虗接響欺罔聖賢後學無辜遭他指注若論此事諸佛不曾出世亦無一法與人達磨不西來二祖不得髓直得皇風蕩蕩野老謳歌心無所恃行無所依聞禪與道似見冤家說色說心如逢猛虎法昌然後與你挑野菜樁黍米作和羅飯煑骨董羮飢即飡困即臥不由諸位自崇高莫學三乘立功課雲巖臯長老至師上堂云鳳凰山色翠凌空寶殿崢嶸𦘕不同止止金毛在何處只應千古絕狐蹤諸仁者知音相見豈在多言如擊石火掣電機點著不來白雲萬里何也菩提之道不可圖度動便失宗覺即迷旨然竿木隨身逢場作戲或時手擎日月遊戲神通有時背負須彌全軍敵勝或則隨波逐浪或則把斷要津無非古佛家風盡是道人活計豈不見昔日雲嵓到藥山山云聞子解弄師子是不嵓云是山云弄得幾出嵓云六出山云我也解弄嵓云弄得幾出山云一出嵓云六即一一即六雲嵓後到溈山山云聞子在藥山時曾弄師子是不嵓云是山云為復常弄有時置嵓云要弄即弄要置即置山云置時師子在什麼處嵓云置也置也師云好一箇師子只是弄得有頭無尾當時若見溈山云置時在什麼處便與放出踞地金毛直教溈山藏身無路既不能如是遂成一箇不了底公案法昌今日因風吹火也未勦絕却請雲嵓禪師略陞此座圓却這箇公案免見他日累及兒孫上堂云一塵纔起大地全収乃拈起拄杖云諸仁者十方世界撮來如粟米大安在法昌拄杖頭上其中眾生不覺不知且道法昌尋常在塵裏在塵外良久云海枯終見底人死不知心上堂夜半烏鷄誰捉去石女無端遭指注空王令下急搜尋唯心便作軍中主雲門長驅溈仰隊件列五位鏘旗布三玄戈弩藥山持刀清原荷斧石鞏彎弓禾山打鼓陣布雪嶺長蛇兵屯黃檗飛虎木馬帶毛烹泥牛和角煑賞三軍犒師旅打葛藤分路布截海橫山颺塵簸土擊玄關除徼路多少平人受辛苦無邊剎海競紛紛三界聖凡無覓處無覔處還知否昨夜雲収天宇寬依前帶月啼高樹上堂云生死交謝寒暑迭遷有物流動人之常情念念不停新新不住如火成灰漸漸消滅又如藏舟於壑藏山於澤人謂得其固不知有力者負之而趨昧者不覺然雖如是殊不知觀身實相觀佛亦然前際不來後際不去今則無住三際求心心不有心不有故妄元無妄元無故即菩提生死涅槃本平等故維摩經云不動等覺建立諸法不出魔界而入佛界於此會得則終日變化不為動畢竟寂滅不為休八難三塗無非淨妙國土塵勞煩惱盡是解脫道場然雖如是要且未出教意譬如蒸沙欲成嘉饌縱經塵劫終不能得既不然者且道親切底事作麼生𦵇嶺不傳唐土信胡人休唱太平歌師到雲嵓陞座云法無定相轉變由人用去則天回地轉觸處周流収來則慮息緣忘聖凡罔測或則神通遊戲垂手塵勞利益有情光揚佛事或則棲神物表遁跡嵓阿枕石眠雲敦脩慧業無非道達群機利他利己所謂動若行雲止猶谷神豈有心於彼此情係於動靜者耶法昌與麼舉唱且道隨順機宜為復別有長處還會麼木馬追風蹄撥剌金毛踞地尾查髿上堂云閑來只麼坐拍手誰賡和回頭忽見簸箕星水墨觀音會推磨乃拍一拍云還會麼八十翁翁雖皓首看看不帶老人容上堂云九月重陽節菊花香未烈策杖倚欄看眼中重著屑諸仁者鷰去鴈來寒暑相催籬邊黃菊正闘霜開陌上垂楊已隨露落或生或殺互顯機鋒或盛或衰咸張主伴無非解脫法門盡是金剛正眼還有人薦得麼看來只是吹灰法却向灘頭脫却衣上堂云法昌今日開爐行脚僧無一箇為報十八高人緘口圍爐打坐不是規矩嚴難免見諸人話墮直饒口似秤槌未免灯籠勘破不知道絕功勳妄自脩因證果若逢臨濟德山應是難能放過但知一念回心定免三乘羈鎻上堂云青山鳥道登者即迷碧落無波動犯風影不是目前法莫生種種心明暗不相關虗空無背面到這裏直似秋潭月影靜夜鍾聲猶是生死岸頭事莫當等閑不見古者道直須向那邊擔荷了却來這邊行李揩磨心識盡却今時過患直似枯木逢春不潤始有少分相應古人與麼說話意作麼生那邊檐荷箇什麼這邊又作麼生行李除非久參碩德乃可知之莫只與麼業識忙忙無明人我私心作解妄生穿鑿如磨塼作鏡相似多少謷訛快須著力莫待前頭路盡方始著忙一朝心眼頓開方知法昌老以佛法為事上堂云昨日送殘年今朝賀新歲新歲與殘年相逐如流水人無百年人盡作千年累一箇無常身百端生狡計殺命資口腹結業求富貴片善不曾修日為煩惱醉且莫醉起來共你說些周秦并漢魏覇業及圖王文經兼武緯凌煙閣上數如麻盡向青山脚下排頭睡爭似無為實相門一超直入如來地上堂云年年四月十六諸方盡皆禁足法昌山裏如何但見山青水淥上堂云諸仁者心是根法是塵兩種猶如鏡上痕痕垢盡時光始現心法雙忘性即真古人已是四楞著地了也汝等諸人作麼生會內視不己見返聽不我聞覺體超然不屬量數正是痕垢在你且道鏡在什麼處直饒分明拈出我更問你什麼處得來你若不知來處山僧為你指出鍊得銅山沒一星入紅爐裏又埃塵須知本自圓成物本自圓成無故新勘辯師在雙嶺受請與英勝二首座相別云三年聚首無事不知檢點將來不無滲漏以拄杖劃一劃云這箇且止宗門事作麼生英云須彌安鼻孔師云與麼則臨崖看虎眼特地一場愁英云深沙努眼睛師云爭奈聖凡無異路方便有多門英云鐵蛇鑽不入師云這般漢有甚共語處英云自緣根力淺莫怨太陽春却劃一劃云宗門事且止這箇事作麼生師便掌英云這漳州子莫無去就師云你這般見解不打更待何時又打英云也是老僧招得英勝二人到山相訪英云和尚尋常愛檢點諸方今日為甚却來古庿裏作活計師云打草只要蛇驚英云且莫塗糊人好師云你又刺頭入膠盆作什麼英云古人道我見兩箇泥牛鬪入海所以住山未審和尚見箇什麼師云你他時異日有把茅蓋頭人來問你你作麼生祗對英云山頭不如嶺尾師云你且道當得住山事麼英云使钁不及拖犁師云還曾夢見古人麼英云和尚又作麼生師展兩手英云鰕跳不出斗師云莫將三寸燭擬並太陽輝英云爭奈公案見在師云亂統禪和如麻似粟師起法堂乃問二人我欲來這裏起法堂且道作得箇什麼向當英云賊是小人師云邵武子動著便作屎臭氣英云曾輕霜雪苦師云明珠自有千金價誰肯林邊打兒英云大似持鉢不得詐道不飢師却指勝云你且道合作得箇什麼向當好𠰚勝云本來無位次不用強安排師云你這驢漢安向甚處著勝云一任敲甎打瓦師云也只是箇杜撰巡官英云若是千金寶何須打兒師云東家人死西家助哀英云路見不平一日英舉大梅斷夾山定山生死中有佛無佛因緣問師云此箇公案作麼生師云大梅當時何不與他本分草料英云作麼生師便打英云一場儱侗師云你試下一轉語看英云一狀領過師云矮子看戲舉盤山光境話英云只如保福與麼說話未免掛人唇齒師云你作麼生英作掌勢師云自屎不知臭英云和尚作麼生師云若據我見處掘箇地坑和你一時埋却且要天下太平黃龍秀維那與數僧至師云重疊關山路闍梨從什麼處來秀云三門裏來師云有三門則從三門裏來無三門從什麼處來秀云恁麼則不從門入也師云因什麼得到這裏秀云法昌門下水泄不通師云不解登山剛嫌路曲秀擬議師云第二參頭道僧云何不問取維那師云酌然龍象蹴踏非驢所堪且坐喫茶人事了秀乃云適來公案可謂光前絕後師云射虎不真徒勞沒羽秀云何得壓良為賤師云佛法不是這箇道理師乃問秀近離什麼處秀云黃龍師云我聞黃龍有三關語是否秀云是師云將為老僧不知秀云有問有答師云未到法昌不妨疑著秀云過在什麼處師打一掌云且莫鈍致黃龍乃送歸安下處秀云古人道一言相契則住一言不契則去且道住則是去則是師云你看這漢一場敗闕秀云與麼則兵隨印轉客任主裁師云便請入堂掛搭秀起庵成師云庵成了只是未有主人在秀云大似對面不相識師云驢前馬後漢秀云氣急殺人師云橫抱小兒擬彰黃簡秀云却請和尚別作箇主人來師云九五須還天子貴群雄徒自起干戈秀云到頭霜夜月任運落前溪師云千里神駒追電去蹇驢猶自沒泥沙秀一日問師承聞和尚久止浮山屢參興化為什麼却法嗣北禪師云瘥病不假驢駝藥秀云傷龜恕鱉不免傍觀師云將謂無人檢點乃拈起拄杖云且道者箇從什麼處得來秀云這老漢敗闕也不知師云不是任公子徒勞話釣竿黃龍南禪師至人事喫茶了師乃云近日黃龍製得一般茶實為諸方未有南云那裏得這消息來師云勸君不用鐫頑石南云老老大大道聽途說師云爭奈公案見在南云這裏尋常如何造作師云老老大大說話也不照顧些子南云賴得左右無人師乃喚侍者更點一椀茶下茶至南云若無造作這箇從什麼處得來師便作撥茶勢南云這箇猶是和尚受用邊事利人事又作麼生師云遇臨濟則敲出骨髓逢德山則揳破腦門因與南禪師舉程大鄉看生緣話師云何不直下與伊勦絕却南云也曾為蛇𦘕足是伊自不瞥地師云和尚如何為他南云咬盡生薑呷醋師云流俗阿師又與麼去南云和尚意作麼生師拈起拂子便打南云這老漢也是無人情師因舉在湖南時曾問興化知有底人向什麼處去化云善財拄杖子師云我不問善財拄杖子且道知有底人向什麼處去化云或則登山或則渡水師云和尚只解步步登高不解從空放下化云老僧雖則年邁要且不負來機南云和尚當時作麼生師云我錯恠興化南云而今知也且道從什麼處去師云你問阿誰南云佯聾詐啞作什麼師云雖然如是要且不負來機師一日在門前栽松南和尚至乃云小院小舍栽許多作什麼師云臨濟道底南云栽得多少師云但見猿棲鶴宿寧知聳漢侵雲南乃指面前石山云這裏為什麼不栽却師云功不浪施南云也只是無下手處師却指石上松云這箇從什麼處得因作石松詩云盤根迸石苔鋪縫偃蹇龍形積翠深擎鶴插空多雨勢帶雲籠月足潮音應無要壓群峯意終有常懷竚雪心猿凍下崖來上哭禪餘獨對苦中吟兜率寬和尚至師云和尚久居兜率為什麼却到人間寬云暫時行履師云來時彌勒菩薩在什麼處寬云不知師云和尚從兜率來麼寬云是師云為什麼却不知寬云向道不知說什麼來不來師云無孔鐵槌有甚用處寬云看這老漢一場懡㦬師與寬和尚看雪次師云好雪寬云好白師云雪與白相去多少寬云如掌作拳師乃於欄上拏雪便打云你且道是拳是掌寬云麤行沙門師云此是文殊大人境界因有詩云倚欄看臈雪光射曉堂寒萬德文殊海千重世界寬泥牛光影亂石女素衣完會得青春意桃花悟更難冬夜與感首座喫菓子師遂拈起一片橘子云這箇滋味何似黃龍感云須待甞過始得師云驗人端的處下口便知音感云末代禪師多虗少實師又拈起托子云者箇作麼生甞感云須是和尚始得師云一箇托子早是不奈何感云饒人不是弱漢師問訥首座古人道天地與我同根萬物與我一體你且道山河大地與你自己是同是別訥云不別師又竪起拂子云這箇𠰚訥云這箇亦然師云你有幾箇自己訥云法有多種理本不二師遂扣床一下云你還知痛痒否訥云不知師云話墮阿師不能打得你師一日與訥首座修花壇乃問訥云南泉道人人見此一株花如夢相似且道你見似箇什麼訥云只是一株花師云與麼則你也只在南泉窠窟裏訥云未審古人意作麼生師云拈甎過來訥過甎了又問師云古人去世久矣問豁長老聞說你曾講唯識論是否豁云粗曾習聽師云三界唯心萬法唯識明有此理豁云是師乃竪起拂子云還見麼豁云見師云見箇什麼豁云見拂子師云老老大大為什麼五戒不持豁云和尚何得不信佛語師云癡人棒打不死你還夢見唯識麼師問肇維那甚處來肇云討菜來師云甚處去肇云寮中去師云尋常問你生死事為什麼不與麼祗對肇云和尚不曾問某甲師云且道你死向什麼處去肇云一任卜度師云不信道肇云某甲與麼祗對有甚不得師云將為卜你不著肇云且道向什麼處去師云鬼窟裏去肇云且莫以己妨人師云爭奈贓物在老僧手裏問肇日出心光耀天陰性地昏不知天地者剛道有乾坤而今日出也那箇是你心光肇云不可更有師云不知天地者剛道有乾坤且道知天地者乾坤向什麼處去肇云三界唯心不可更有師云廚下燒火你覺肚皮熱麼肇云問這箇作什麼師云伎死禪和如麻似粟師問肇溈山水牯牛話你作麼生會肇云無這箇閑功夫師云只如世尊拈花迦葉微笑又作麼生肇云不妨令人疑著師云龍頭蛇尾漢問僧一切聲是佛聲是否僧云是師云為什麼鵶作鴉聲鵲作鵲噪僧云和尚自生分別師便打又問僧一切聲是佛聲是否僧云不是師云為什麼不是僧云鴉作鵶聲鵲作鵲噪師亦打後有僧問師前頭是且從打不是為什麼亦打師又打云且聽明眼人斷看歲夜喫湯次感首座云昔日北禪分歲曾烹露地白牛和尚今夜分歲有何施設師云臈雪連天白春風逼戶寒感云大眾喫箇什麼師云莫嫌冷淡無滋味一飽能消萬劫飢感云未審是什麼人置辦師云無慚愧漢來處也不知登首座至師云你作叢林表帥為什麼被人喚作登無明登便抽坐具作打勢師云且莫亂做別處即得法昌門下不容你登擬議師便打一掌登云將謂侯白師云你作這般說話也道我作禪客登云法昌門下可謂風吹不入師云教你入得堪作什麼師問登無明實性即佛性無明在這裏佛性在什麼處登云不可別有師云喚你作釋迦老子得麼登云至道無難唯嫌揀擇師云你夢見三祖登云和尚尊意如何師便打登云打即不無且道佛性在什麼處師拈棒登便走云今日被這老漢折挫一掌師云似這般不知痛痒漢打殺也無罪過石門臯和尚去住雲嵓師云只見雲歸碧嶂和尚為什麼入郭辤山皐云偶徇時機師云主人公在什麼處臯云避喧求靜豈是高人師云似則似是即未是皐云和尚作麼生師竪起拂子云是喧是靜皐無語師云不信道師問臯近離什麼處臯云石門師云我聞石門路嶮水泄不通因甚到這裏臯云十里雙牌五里單堠師云途中事作麼生臯云到處行松色時時聽水聲師云來時水牯牛在甚麼處臯云自有人看師云鼻索為什麼在法昌手裏臯云這老漢瞞却多少人隨手打一坐具師云三十年撈龍打鳳今日被鼠咬恭首座住禪林訪師師云見說你要為黃龍燒香是否恭云不敢師云我聞龍生龍子須是解興雲致雨始得恭云但隨家豐儉師云你未