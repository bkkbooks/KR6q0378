body:
  text: 洪州分寧法昌禪院遇禪師語錄序南州徐俯今之住院為長老聚徒稱出世宗師者莫知其幾何人其平居舉揚問答之語門人弟子必錄之號曰語錄語錄之言滿天下而佛法益微豈言多去道轉遠𦘕餅不足以充飢耶蓋能言之者未必皆其人也欲知其道之淺深當視其人之賢不昔法昌老踈衣糲食冰清玉潔耡耰以給四方雲水之人學者莫能同其作勞又苦其枯淡挈挈然去之堂中至無人先君之少也未為人所知獨師先奇之鄉人知敬師也自先君始二人之交至相好也先君之音容邈矣三十年來無復此老之風味思其人而不可見則其語又可廢耶遂刊而傳之崇寧四年正月二十二日序
